name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v0.1.0). Must already exist."
        required: true

permissions:
  contents: write

jobs:
  test:
    name: Verify before release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.tag || github.ref }}
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bunx tsc --noEmit
      - run: bun test

  build:
    name: Build ${{ matrix.output }}
    needs: test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: bun-linux-x64
            output: locadoc-linux-x64
          - target: bun-linux-arm64
            output: locadoc-linux-arm64
          - target: bun-darwin-x64
            output: locadoc-darwin-x64
          - target: bun-darwin-arm64
            output: locadoc-darwin-arm64
          - target: bun-windows-x64
            output: locadoc-windows-x64.exe
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.tag || github.ref }}

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install --frozen-lockfile

      - name: Compile
        run: bun build --compile --target=${{ matrix.target }} --outfile=${{ matrix.output }} src/cli.ts

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.output }}
          path: ${{ matrix.output }}
          if-no-files-found: error
          retention-days: 7

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.tag || github.ref }}

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true

      - name: Compute SHA-256 checksums
        working-directory: dist
        run: |
          sha256sum locadoc-* > SHA256SUMS
          cat SHA256SUMS

      - name: Create release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ inputs.tag || github.ref_name }}
          files: |
            dist/locadoc-*
            dist/SHA256SUMS
          generate_release_notes: true
          fail_on_unmatched_files: true
