name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Typecheck and test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bunx tsc --noEmit

      - name: Tests
        run: bun test

      - name: Smoke-build the CLI binary
        run: bun build --compile --target=bun-linux-x64 --outfile=/tmp/locadoc-smoke src/cli.ts

      - name: Smoke-run --version
        run: /tmp/locadoc-smoke --version
